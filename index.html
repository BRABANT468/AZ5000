document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ce45a9dd-ea84-4078-b616-6810e63ae115\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>\n    html, body { margin: 0; padding: 0; background: #212327; }\n    * { box-sizing: border-box; }\n    input::placeholder { color: #6b6e77; }\n    /* Automatische vergroting op grotere schermen (geen browser-zoom nodig) */\n    @media (min-width: 760px)  { body { zoom: 1.15; } }\n    @media (min-width: 1000px) { body { zoom: 1.35; } }\n    @media (min-width: 1400px) { body { zoom: 1.5; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div data-screen-label=\"Rondo hoofdvenster\" style=\"min-height:100vh;background:#212327;color:#e9eaee;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,sans-serif;padding:44px 24px 100px\">\n  <div style=\"max-width:660px;margin:0 auto\">\n\n    <div style=\"position:relative;display:flex;align-items:center;gap:14px;margin-bottom:6px\">\n      <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.5px;color:#f3f4f7\">{{ appName }}<\u002Fdiv>\n      <sc-if value=\"{{ showTagline }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:14px;color:#8a8d96\">taken · rondes · sublijsten<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <button onclick=\"{{ onToggleSettings }}\" title=\"Instellingen: kleuren\" style=\"width:30px;height:30px;border-radius:9px;border:1px solid #3c3f47;background:#2a2c31;color:#c9cbd2;line-height:1;cursor:pointer;padding:0;flex-shrink:0\" style-hover=\"background:#34363c;color:#fff\"><span style=\"font-size:21px\">⚙︎<\u002Fspan><\u002Fbutton>\n      <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;right:0;top:42px;z-index:60;background:#2a2c32;border:1px solid #3c3f47;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,0.5);padding:16px 18px;display:flex;flex-direction:column;gap:16px;width:316px\">\n          <div style=\"display:flex;align-items:center;gap:8px\">\n            <div style=\"font-size:14px;font-weight:700;color:#f3f4f7\">Instellingen<\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:800;color:#212327;background:#FFD60A;border-radius:7px;padding:2px 8px;letter-spacing:0.3px\">VERSIE 24<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <button onclick=\"{{ onToggleSettings }}\" title=\"Sluiten\" style=\"width:22px;height:22px;border-radius:50%;border:none;background:#3c3f45;color:#d6d8de;font-size:11px;font-weight:700;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#ff453a;color:#fff\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Afvink-bolletjes<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ accentOptions }}\" as=\"copt\" hint-placeholder-count=\"0\">\n                <button onclick=\"{{ copt.onPick }}\" title=\"{{ copt.name }}\" style=\"width:25px;height:25px;border-radius:50%;background:{{ copt.color }};border:2px solid {{ copt.ring }};cursor:pointer;padding:0\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Balkjes (standaardkleur)<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ barOptions }}\" as=\"copt\" hint-placeholder-count=\"0\">\n                <button onclick=\"{{ copt.onPick }}\" title=\"{{ copt.name }}\" style=\"width:25px;height:25px;border-radius:50%;background:{{ copt.color }};border:2px solid {{ copt.ring }};cursor:pointer;padding:0\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Weergave<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ displayToggles }}\" as=\"tog\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <div style=\"flex:1;font-size:13px;color:#c9cbd2\">{{ tog.label }}<\u002Fdiv>\n                  <button onclick=\"{{ tog.onToggle }}\" title=\"Aan/uit\" style=\"position:relative;width:36px;height:21px;border-radius:11px;border:none;background:{{ tog.bg }};cursor:pointer;padding:0;flex-shrink:0;transition:background .15s\"><span style=\"position:absolute;top:2px;left:{{ tog.knob }};width:17px;height:17px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fspan><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Timergeluid (piepjes)<\u002Fdiv>\n            <div style=\"position:relative\">\n              <button onclick=\"{{ onToggleSoundPicker }}\" style=\"width:100%;display:flex;align-items:center;gap:8px;background:#212327;border:1px solid #3c3f47;border-radius:8px;color:#e9eaee;font-size:13px;font-family:inherit;padding:7px 10px;cursor:pointer\" style-hover=\"border-color:#565962\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:#FF453A;flex-shrink:0\"><\u002Fspan>\n                <span style=\"flex:1;text-align:left\">{{ beepSoundName }}<\u002Fspan>\n                <span style=\"color:#8a8d96;font-size:10px\">▼<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ soundPickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;left:0;right:0;top:38px;z-index:70;background:#212327;border:1px solid #3c3f47;border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,0.5);padding:10px;display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px\">\n                    <sc-for list=\"{{ beepOptions }}\" as=\"bo\" hint-placeholder-count=\"0\">\n                      <button onclick=\"{{ bo.onPick }}\" title=\"Klik om te kiezen en te beluisteren\" style=\"display:flex;align-items:center;gap:7px;background:{{ bo.bg }};border:1px solid {{ bo.border }};border-radius:8px;color:#e9eaee;font-size:12.5px;font-family:inherit;padding:6px 9px;cursor:pointer;text-align:left\" style-hover=\"border-color:#6b6e77\">\n                        <span style=\"display:block;width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid #FF453A;flex-shrink:0\"><\u002Fspan>\n                        <span>{{ bo.name }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <div style=\"font-size:12px;color:#8a8d96;flex-shrink:0\">Herhaling<\u002Fdiv>\n                    <input sc-camel-default-value=\"{{ beepRepeatVal }}\" onkeydown=\"{{ onBeepRepeatKey }}\" onblur=\"{{ onBeepRepeatBlur }}\" placeholder=\"3\" style=\"flex:1;min-width:0;background:#2a2c31;border:1px solid #3c3f47;border-radius:8px;color:#e9eaee;font-size:13px;font-family:inherit;padding:6px 9px;outline:none;text-align:right\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Naam van de app<\u002Fdiv>\n            <input sc-camel-default-value=\"{{ appName }}\" onkeydown=\"{{ onNameKey }}\" onblur=\"{{ onNameBlur }}\" style=\"width:100%;box-sizing:border-box;background:#212327;border:1px solid #3c3f47;border-radius:8px;color:#e9eaee;font-size:14px;font-family:inherit;padding:7px 10px;outline:none\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12.5px;color:#8a8d96;margin-bottom:9px\">Zo werkt het<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12px;color:#9a9da6;line-height:1.5\">\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Klik op een taaknaam of het ▼-pijltje om de subtaken uit te klappen<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Dubbelklik op tekst om te bewerken<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Klik op het + tussen taken om er tussenin toe te voegen<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Sleep taken om ze te verplaatsen · houd een taak even midden óp een andere taak tot de groene + SUBTAAK verschijnt en laat los: hij wordt subtaak<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Pijltje rechts tijdens typen = deel ernaast · pijltje omlaag = taak eronder<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Balkkleur per taak: klik op het gekleurde rondje in de SUBTAKEN-regel<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Per taak: + = deel ernaast · ↺ = bolletjes leegmaken · × = verwijderen<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Tijd: klik op het tijdvak (0m) in het knopveldje van een subtaak en typ de minuten<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>De tijdbalk telt alle taak-tijden op (ook in sublijsten): links klaar / gepland, de balk loopt vol bij afvinken<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>Beschikbare tijd instellen: ⚙︎ rechts in de tijdbalk · groen = het past, rood = te veel gepland<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#d6d8de;flex-shrink:0;margin-top:5px\"><\u002Fspan><span>▶ = timer: de taken lopen één voor één af op hun tijd · 3 piepjes bij start en bij elk einde<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <sc-if value=\"{{ showTimebar }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:18px;background:#26282d;border:1px solid #33353c;border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:10px\">\n        <div style=\"display:flex;align-items:center;gap:10px\">\n        <button onclick=\"{{ onPlayAll }}\" title=\"Alle open taken met tijd afspelen\" style=\"width:32px;height:32px;border-radius:50%;border:none;background:#FF453A;cursor:pointer;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#d93a30\"><span style=\"margin-left:2px;display:block;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid #fff\"><\u002Fspan><\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:7px;flex-shrink:0\">\n          <div style=\"font-size:12.5px;font-weight:700;color:#c9cbd2\">Rondes<\u002Fdiv>\n          <button onclick=\"{{ onToggleRounds }}\" title=\"Rondes aan: ▶ pakt per lijn de eerste taak die nog open staat\" style=\"position:relative;width:36px;height:21px;border-radius:11px;border:none;background:{{ roundsBg }};cursor:pointer;padding:0;flex-shrink:0\"><span style=\"position:absolute;top:2px;left:{{ roundsKnob }};width:17px;height:17px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:5px;flex-shrink:0\">\n          <div style=\"font-size:20px;font-weight:800;color:{{ plannedColor }}\">{{ doneMin }}<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:700;color:#c9cbd2\">/ {{ plannedMin }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8a8d96\">min klaar / gepland<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <sc-if value=\"{{ budgetEditing }}\" hint-placeholder-val=\"{{ false }}\">\n          <input ref=\"{{ budgetRef }}\" sc-camel-default-value=\"{{ budgetMin }}\" onkeydown=\"{{ onBudgetKey }}\" onblur=\"{{ onBudgetBlur }}\" style=\"width:56px;background:#212327;border:1px solid #3c3f47;border-radius:8px;color:#e9eaee;font-size:14px;font-family:inherit;padding:5px 8px;outline:none;text-align:right\">\n        <\u002Fsc-if>\n        <sc-if value=\"{{ budgetStatic }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:baseline;gap:5px;flex-shrink:0\">\n            <div style=\"font-size:20px;font-weight:800;color:#f3 ttom:1px solid #4a4d55;color:#f3f4f7;font-size:21px;font-weight:700;font-family:inherit;padding:2px 0\">\n            <\u002Fsc-if>\n            <sc-if value=\"{{ list.titleStatic }}\" hint-placeholder-val=\"{{ true }}\">\n              <div ondoubleclick=\"{{ list.onTitleDbl }}\" title=\"Dubbelklik om de lijstnaam te wijzigen\" style=\"flex:1;font-size:21px;font-weight:700;color:#f3f4f7;cursor:default\">{{ list.title }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"font-size:12.5px;color:#7a7d86\">{{ list.count }}<\u002Fdiv>\n            <button onclick=\"{{ list.onAddTop }}\" title=\"Taak bovenaan toevoegen\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#c9cbd2;font-size:19px;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c;color:#fff\">+<\u002Fbutton>\n            <button onclick=\"{{ list.onDeleteList }}\" title=\"Lijst en alle taken verwijderen\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;font-size:10px;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#ff453a;border-color:#ff453a\">🗑️<\u002Fbutton>\n            <button onclick=\"{{ list.onResetMain }}\" title=\"Alle gele hoofdbolletjes leegmaken\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#FFD60A;font-size:18px;font-weight:700;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c\">↺<\u002Fbutton>\n            <button onclick=\"{{ list.onResetAll }}\" title=\"Alle subtaak-bolletjes (rechts van het gele) leegmaken\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#ff453a;font-size:18px;font-weight:700;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c\">↺<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div data-dropzone=\"{{ list.zoneId }}\" style=\"background:#26282d;border:1px solid #33353c;border-radius:16px;padding:10px 8px\">\n            <sc-for list=\"{{ list.rows }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"position:relative\">\n                <sc-for list=\"{{ row.rails }}\" as=\"rail\" hint-placeholder-count=\"0\"><div style=\"position:absolute;left:{{ rail.left }};top:0;bottom:0;width:2px;border-radius:1px;background:#3c3f47\"><\u002Fdiv><\u002Fsc-for>\n                <sc-if value=\"{{ row.between }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"height:14px;margin:-5px 0;display:flex;align-items:center;justify-content:center;opacity:{{ row.plusOpacity }};transition:opacity .12s\" style-hover=\"opacity:1\">\n                    <div style=\"height:17px;border-radius:9px;background:#3c3f47;display:flex;align-items:center;padding:0 2px\">\n                      <div onclick=\"{{ row.onBetween }}\" title=\"Klik om hier een taak in te voegen\" style=\"width:19px;height:17px;position:relative;cursor:pointer\"><div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:9px;height:1.5px;background:#9ba0a8;border-radius:1px\"><\u002Fdiv><div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1.5px;height:9px;background:#9ba0a8;border-radius:1px\"><\u002Fdiv><\u002Fdiv>\n                      <div style=\"width:1px;height:9px;background:#26282d\"><\u002Fdiv>\n                      <div onclick=\"{{ row.onCopyAbove }}\" title=\"Taak erboven hierheen kopiëren\" style=\"width:19px;height:17px;display:flex;align-items:center;justify-content:center;cursor:pointer\"><div style=\"position:relative;width:9px;height:10px\"><div style=\"position:absolute;left:3px;top:0;width:5px;height:6px;border:1.3px solid #9ba0a8;border-radius:1.5px\"><\u002Fdiv><div style=\"position:absolute;left:0;top:3px;width:5px;height:6px;border:1.3px solid #9ba0a8;border-radius:1.5px;background:#3c3f47\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"height:2px;border-radius:1px;background:{{ row.dropLine }};margin:0 10px\"><\u002Fdiv>\n                <sc-if value=\"{{ row.isEdit }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:8px 12px 8px {{ row.padLeft }}\">\n                    <div style=\"width:{{ row.circleSize }};height:{{ row.circleSize }};border-radius:50%;border:2px solid {{ row.circleColor }};opacity:0.35;flex-shrink:0\"><\u002Fdiv>\n                    <input sc-camel-auto-focus=\"{{ true }}\" sc-camel-default-value=\"{{ row.text }}\" onkeydown=\"{{ row.onKey }}\" onblur=\"{{ row.onBlur }}\" ref=\"{{ row.inputRef }}\" placeholder=\"{{ row.placeholder }}\" style=\"flex:1;background:transparent;border:none;outline:none;color:#e9eaee;font-size:{{ row.textSize }};font-family:inherit;padding:3px 0\">\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ row.isTask }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div draggable=\"true\" sc-camel-on-drag-start=\"{{ row.onDragStart }}\" sc-camel-on-drag-over=\"{{ row.onDragOver }}\" ondrop=\"{{ row.onDrop }}\" sc-camel-on-drag-end=\"{{ row.onDragEnd }}\" style=\"position:relative;display:flex;align-items:center;gap:12px;padding:8px 12px 8px {{ row.padLeft }};border-radius:10px;cursor:grab;background:{{ row.nestBg }};box-shadow:{{ row.nestRing }};transition:background .15s,box-shadow .15s\" style-hover=\"background:rgba(255,255,255,0.04)\">\n                    <sc-if value=\"{{ row.nestGlow }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:5px;background:#32D74B;color:#0d2a14;font-size:10.5px;font-weight:800;border-radius:999px;padding:4px 10px;letter-spacing:0.5px;pointer-events:none;box-shadow:0 4px 14px rgba(50,215,75,0.4)        <div style=\"font-size:22px;font-weight:800;color:#f3f4f7;font-variant-numeric:tabular-nums\">{{ timerClock }}<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#8a8d96;font-variant-numeric:tabular-nums\">/ {{ timerTotal }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onResetTimer }}\" title=\"Alles resetten: terug naar taak 1, bolletjes leeg\" style=\"width:30px;height:30px;border-radius:50%;border:1px solid #3c3f47;background:#33353b;color:#FFD60A;font-size:15px;font-weight:700;line-height:1;cursor:pointer;padding:0;flex-shrink:0\" style-hover=\"background:#3c3f45\">↺<\u002Fbutton>\n          <button onclick=\"{{ onCloseTimer }}\" title=\"Stoppen en sluiten\" style=\"width:26px;height:26px;border-radius:50%;border:none;background:#ff453a;color:#fff;font-size:12.5px;font-weight:700;line-height:1;cursor:pointer;padding:0;flex-shrink:0\" style-hover=\"background:#d93a30\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow:auto;padding:2px 8px 14px\">\n          <sc-for list=\"{{ timerRows }}\" as=\"trow\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;opacity:{{ trow.opacity }}\">\n              <button onclick=\"{{ trow.onCheck }}\" title=\"Afvinken (ook in de hoofdlijst)\" style=\"width:26px;height:26px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid {{ trow.circleColor }};background:{{ trow.circleBg }};color:{{ trow.checkColor }};font-size:{{ trow.checkSize }};font-weight:800;display:flex;align-items:center;justify-content:center;padding:0\">{{ trow.check }}<\u002Fbutton>\n              <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:5px\">\n                <div style=\"font-size:15px;color:#e9eaee;overflow-wrap:anywhere;font-weight:{{ trow.weight }}\">{{ trow.text }}<\u002Fdiv>\n                <div style=\"height:5px;border-radius:2.5px;background:#3a3d44;overflow:hidden\"><div style=\"width:{{ trow.pct }};height:100%;background:{{ trow.barColor }};border-radius:2.5px;transition:width 1s linear\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ trow.showPlay }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ trow.onStart }}\" title=\"Deze taak nu starten\" style=\"width:26px;height:26px;border-radius:50%;border:none;background:#FF453A;cursor:pointer;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#d93a30\"><span style=\"margin-left:1px;display:block;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid #fff\"><\u002Fspan><\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ trow.showPause }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ trow.onPause }}\" title=\"Pauzeren\" style=\"width:26px;height:26px;border-radius:50%;border:none;background:#FF453A;color:#fff;font-size:8px;font-weight:800;cursor:pointer;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#d93a30\">❚❚<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ trow.playSpacer }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:26px;height:26px;flex-shrink:0\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font-size:13px;font-weight:700;color:{{ trow.labelColor }};font-variant-numeric:tabular-nums;flex-shrink:0\">{{ trow.label }}<\u002Fdiv>\n              <button onclick=\"{{ trow.onResetOne }}\" title=\"Tijd van deze taak resetten\" style=\"width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:#565962;font-size:16px;font-weight:700;line-height:1;cursor:pointer;padding:0;flex-shrink:0\" style-hover=\"color:#FFD60A\">↺<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;padding:10px 20px 14px;border-top:1px solid #33353c\">\n          <div style=\"flex:1;font-size:13px;color:#c9cbd2\">Ga naar volgende taken<\u002Fdiv>\n          <button onclick=\"{{ onToggleAutoNext }}\" title=\"Automatisch doorgaan met de volgende taak als de tijd om is\" style=\"position:relative;width:36px;height:21px;border-radius:11px;border:none;background:{{ autoNextBg }};cursor:pointer;padding:0;flex-shrink:0\"><span style=\"position:absolute;top:2px;left:{{ autoNextKnob }};width:17px;height:17px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { data: this.load(), popups: [], editing: null, editingTitle: null, drag: null, dropAt: null, pickerFor: null, settingsOpen: false, soundPickerOpen: false, budgetEdit: false, timeEditFor: null, timerOpen: false, timerQueue: [], timerIdx: 0, timerRemaining: 0, timerRunning: false, timerFinished: false };\n\n  componentDidMount() {\n    this._tint = setInterval(() => this.tickTimer(), 1000);\n    this._dragOverDoc = (e) => {\n      const d = this._drag;\n      if (!d || d.cid.slice(0, 2) !== 'L:') return;\n      const el = document.querySelector('[data-dropzone=\"' + d.cid + '\"]');\n      if (!el) return;\n      const r = el.getBoundingClientRect();\n      if (e.clientY < r.top) {\n        e.preventDefault();\n        const cur = this.state.dropAt;\n        if (!cur || cur.cid !== d.cid || cur.index !== 0) this.setState({ dropAt: { cid: d.cid, index: 0 } });\n      } else if (e.clientY > r.bottom) {\n        e.preventDefault();\n        const len = (this.container(d.cid) || []).length;\n        const cur = this.state.dropAt;\n        if (!cur || cur.cid !== d.cid || cur.index !== len) this.setState({ dropAt: { cid: d.cid, index: len } });\n      }\n    };\n    this._dropDoc = (e) => {\n      const d = this._drag, da = this.state.dropAt;\n      if (!d) return;\n      const el = document.querySelector('[data-dropzone=\"' + d.cid + '\"]');\n      if (el) {\n        const r = el.getBoundingClientRect();\n        if (e.clientY >= r.top && e.clientY <= r.bottom) return;\n      }\n      if (da && da.cid === d.cid) { e.preventDefault(); this.move(d.cid, d.idx, da.index); }\n      this._drag = null;\n      this.setState({ drag: null, dropAt: null });\n    };\n    document.addEventListener('dragover', this._dragOverDoc);\n    document.addEventListener('drop', this._dropDoc);\n  }\n  componentWillUnmount() {\n    clearInterval(this._tint);\n    document.removeEventListener('dragover', this._dragOverDoc);\n    document.removeEventListener('drop', this._dropDoc);\n  }\n\n  fmt(sec) { const m = Math.floor(sec / 60), s = sec % 60; return m + ':' + (s < 10 ? '0' : '') + s; }\n\n  beepRepeat() {\n    const s = this.state.data.settings || {};\n    const v = parseInt(s.beepRepeat, 10);\n    return (!isNaN(v) && v >= 1 && v <= 20) ? v : 3;\n  }\n\n  beepPresets() {\n    const tone = (ctx, o2) => {\n      const o = ctx.createOscillator(), g = ctx.createGain();\n      o.connect(g); g.connect(ctx.destination);\n      o.type = o2.type || 'sine';\n      o.frequency.setValueAtTime(o2.f, o2.t);\n      if (o2.glideTo) o.frequency.exponentialRampToValueAtTime(o2.glideTo, o2.t + o2.dur * 0.6);\n      g.gain.setValueAtTime(0.0001, o2.t);\n      g.gain.exponentialRampToValueAtTime(o2.gain || 0.3, o2.t + 0.015);\n      g.gain.exponentialRampToValueAtTime(0.0001, o2.t + o2.dur);\n      o.start(o2.t); o.stop(o2.t + o2.dur + 0.05);\n    };\n    return [\n      { key: 'standaard', name: 'Standaard', gap: 0.29, play: (ctx, t) => tone(ctx, { f: 1100, t, dur: 0.207, gain: 0.3 }) },\n      { key: 'laag', name: 'Laag', gap: 0.32, play: (ctx, t) => tone(ctx, { f: 660, t, dur: 0.23, gain: 0.35 }) },\n      { key: 'blokje', name: 'Blokje', gap: 0.29, play: (ctx, t) => tone(ctx, { f: 1100, t, dur: 0.17, type: 'square', gain: 0.12 }) },\n      { key: 'klokkenspel', name: 'Klokkenspel', gap: 0.55, play: (ctx, t) => { tone(ctx, { f: 880, t, dur: 0.7, gain: 0.25 }); tone(ctx, { f: 2428.8, t, dur: 0.45, gain: 0.08 }); tone(ctx, { f: 4752, t, dur: 0.25, gain: 0.03 }); } },\n      { key: 'marimba', name: 'Marimba', gap: 0.34, play: (ctx, t) => { tone(ctx, { f: 523.25, t, dur: 0.32, type: 'triangle', gain: 0.4 }); tone(ctx, { f: 2093, t, dur: 0.1, gain: 0.06 }); } },\n      { key: 'harp', name: 'Harp', gap: 0.62, play: (ctx, t) => { tone(ctx, { f: 523.25, t, dur: 0.5, gain: 0.2 }); tone(ctx, { f: 659.25, t: t + 0.09, dur: 0.5, gain: 0.2 }); tone(ctx, { f: 783.99, t: t + 0.18, dur: 0.55, gain: 0.2 }); } },\n      { key: 'druppel', name: 'Druppel', gap: 0.4, play: (ctx, t) => tone(ctx, { f: 420, t, dur: 0.24, gain: 0.3, glideTo: 950 }) },\n      { key: 'kristal', name: 'Kristal', gap: 0.5, play: (ctx, t) => { tone(ctx, { f: 1567.98, t, dur: 0.55, gain: 0.14 }); tone(ctx, { f: 1583, t, dur: 0.55, gain: 0.1 }); tone(ctx, { f: 2349.32, t, dur: 0.4, gain: 0.06 }); } },\n      { key: 'gong', name: 'Gong', gap: 0.9, play: (ctx, t) => { tone(ctx, { f: 196, t, dur: 1.2, gain: 0.35 }); tone(ctx, { f: 261.6, t, dur: 1.0, gain: 0.18 }); tone(ctx, { f: 392, t, dur: 0.8, gain: 0.1 }); tone(ctx, { f: 523.25, t, dur: 0.5, gain: 0.05 }); } },\n      { key: 'belletje', name: 'Belletje', gap: 0.42, play: (ctx, t) => { tone(ctx, { f: 1760, t, dur: 0.35, gain: 0.18 }); tone(ctx, { f: 4224, t, dur: 0.2, gain: 0.05 }); } }\n    ];\n  }\n\n  beep(n, force) {\n    const s = this.state.data.settings || {};\n    if (!force && (s.beeps ?? true) === false) return;\n    try {\n      const ctx = this._audio || (this._audio = new (window.AudioContext || window.webkitAudioContext)());\n      if (ctx.state === 'suspended') ctx.resume();\n      const presets = this.beepPresets();\n      const p = presets.find(x => x.key === (s.bee merQueue.length) {\n      this.setState({ timerIdx: next, timerRemaining: st.timerQueue[next].min * 60, timerRunning: autoNext });\n    } else {\n      this.setState({ timerFinished: true, timerRunning: false, timerRemaining: 0, timerIdx: next });\n    }\n  }\n\n  resetTimerAll() {\n    const st = this.state;\n    if (!st.timerQueue.length) return;\n    st.timerQueue.forEach(q => { const f = this.findTask(q.id); if (f) f.node.done = false; });\n    this.save();\n    this.setState({ timerIdx: 0, timerRemaining: st.timerQueue[0].min * 60, timerFinished: false });\n  }\n\n  resetTimerOne(i) {\n    const st = this.state;\n    const q = st.timerQueue[i];\n    if (!q) return;\n    const f = this.findTask(q.id);\n    if (f) f.node.done = false;\n    this.save();\n    if (i <= st.timerIdx || st.timerFinished) {\n      this.setState({ timerIdx: i, timerRemaining: q.min * 60, timerFinished: false });\n    } else {\n      this.refresh();\n    }\n  }\n\n  timeSums() {\n    let planned = 0, done = 0;\n    const walk = (arr) => (arr || []).forEach(n => {\n      if (n.min) { planned += n.min; if (n.done) done += n.min; }\n      walk(n.children); walk(n.parts);\n    });\n    this.state.data.lists.forEach(l => walk(l.tasks));\n    return { planned, done };\n  }\n\n  accent() { return (this.state.data.settings && this.state.data.settings.accent) || '#FFD60A'; }\n  barDefault() { return (this.state.data.settings && this.state.data.settings.bar) || this.accent(); }\n  setSetting(key, val) {\n    if (!this.state.data.settings) this.state.data.settings = {};\n    this.state.data.settings[key] = val;\n    this.refresh();\n  }\n  applyBarColorAll(color) {\n    const walk = (arr) => (arr || []).forEach(n => {\n      if ((n.children || []).length || (n.parts || []).length || n.color) n.color = color;\n      walk(n.children); walk(n.parts);\n    });\n    this.state.data.lists.forEach(l => walk(l.tasks));\n  }\n\n  allColors() {\n    return [\n      { name: 'Geel', color: '#FFD60A' },\n      { name: 'Donkergeel', color: '#F7B500' },\n      { name: 'Lichtgeel', color: '#FFE14D' },\n      { name: 'Goudgeel', color: '#FFB340' },\n      { name: 'Groen', color: '#32D74B' },\n      { name: 'Blauw', color: '#0A84FF' },\n      { name: 'Rood', color: '#FF453A' },\n      { name: 'Oranje', color: '#FF9F0A' }\n    ];\n  }\n\n  barColors() {\n    return [\n      { name: 'Geel', color: '#FFD60A' },\n      { name: 'Groen', color: '#32D74B' },\n      { name: 'Blauw', color: '#0A84FF' },\n      { name: 'Rood', color: '#FF453A' },\n      { name: 'Oranje', color: '#FF9F0A' }\n    ];\n  }\n\n  palette() { return ['#32D74B', '#0A84FF', '#FF453A', '#FF9F0A', '#BF5AF2']; }\n  uid() { return 't' + Math.random().toString(36).slice(2, 10); }\n\n  seed() {\n    const T = (text, children) => ({ id: this.uid(), text, done: false, color: null, children: children || [] });\n    const P = this.palette();\n    const eten = T('Eten', [T('Boodschappenlijstje maken'), T('Boodschappen kopen'), T('Eten koken')]);\n    const workout = T('Workout', [T('Warming-up'), T('Krachttraining')]);\n    const health = T('Health', [T('Wandeling maken')]);\n    eten.color = P[0]; workout.color = P[1]; health.color = P[2];\n    const taak2 = T('Eten / Workout / Health', [eten, workout, health]);\n    taak2.color = P[1];\n    const huis = T('Huis opruimen'); huis.color = P[0];\n    return { lists: [\n      { id: this.uid(), title: 'Vandaag', tasks: [huis, taak2, T('Financiën')] },\n      { id: this.uid(), title: 'Langere taken', tasks: [T('Administratie ordenen')] }\n    ] };\n  }\n\n  load() {\n    try {\n      const s = localStorage.getItem('rondo-v1');\n      if (s) { const d = JSON.parse(s); if (d && d.lists) return d; }\n    } catch (e) {}\n    return this.seed();\n  }\n  save() { try { localStorage.setItem('rondo-v1', JSON.stringify(this.state.data)); } catch (e) {} }\n\n  findTask(id) {\n    const walk = (arr) => {\n      for (let i = 0; i < arr.length; i++) {\n        const n = arr[i];\n        if ( d = newNode;\n    const accent = this.barDefault();\n    if (ed.cid.slice(0, 2) === 'T:') {\n      const f = this.findTask(ed.cid.slice(2));\n      if (f && !f.node.color) f.node.color = accent;\n    } else if (ed.cid.slice(0, 2) === 'P:') {\n      const f = this.findTask(ed.cid.slice(2));\n      if (f) {\n        if (!f.node.color) f.node.color = accent;\n        const part = arr[idx];\n        if (part && !part.color) part.color = accent;\n      }\n    }\n    this.setState({ editing: chain ? { cid: ed.cid, index: idx + 1, existing: false } : null });\n    this.save();\n  }\n\n  commitSplit(value) {\n    const ed = this.state.editing;\n    if (!ed) return;\n    const arr = this.container(ed.cid);\n    if (!arr) { this.setState({ editing: null }); return; }\n    const text = (value || '').trim();\n    const parts = text.split('/').map(s => s.trim()).filter(Boolean);\n    if (parts.length < 2) { this.commitEdit(value, false); return; }\n    const P = this.palette();\n    const children = parts.map((p, i) => ({ id: this.uid(), text: p, done: false, color: P[i % 5], children: [] }));\n    if (ed.existing && arr[ed.index]) {\n      const node = arr[ed.index];\n      node.text = text;\n      node.children = (node.children || []).concat(children);\n      if (!node.color) node.color = P[arr.filter(s => s.color && s !== node).length % 5];\n    } else {\n      const node = { id: this.uid(), text, done: false, color: P[arr.filter(s => s.color).length % 5], children };\n      arr.splice(Math.min(ed.index, arr.length), 0, node);\n    }\n    this.setState({ editing: null });\n    this.save();\n  }\n\n  findParent(taskId) {\n    const walk = (arr, cid) => {\n      for (let i = 0; i < arr.length; i++) {\n        const n = arr[i];\n        if (n.id === taskId) return { cid, index: i };\n        const r = walk(n.children || [], 'T:' + n.id); if (r) return r;\n        const r2 = walk(n.parts || [], 'P:' + n.id); if (r2) return r2;\n      }\n      return null;\n    };\n    for (const
