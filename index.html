document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a5e37ccb-70eb-46a9-b943-4681bb25774b\"><\u002Fscript>\n<title>Notitie App<\u002Ftitle>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>\n    html, body { margin: 0; padding: 0; background: #212327; }\n    * { box-sizing: border-box; }\n    input::placeholder { color: #6b6e77; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div data-screen-label=\"Rondo hoofdvenster\" style=\"min-height:100vh;background:#212327;color:#e9eaee;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,sans-serif;padding:44px 24px 100px\">\n  <div style=\"max-width:660px;margin:0 auto\">\n\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:6px\">\n      <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.5px;color:#f3f4f7\">Notitie App<\u002Fdiv>\n      <div style=\"font-size:14px;color:#8a8d96\">taken · rondes · sublijsten<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#6b6e77;margin-bottom:36px;line-height:1.6\">Klik op een taaknaam voor de subtaken-popup · dubbelklik op tekst om te bewerken · beweeg tussen taken en dubbelklik op + om er tussenin toe te voegen · sleep taken om te verplaatsen.<\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:42px\">\n      <sc-for list=\"{{ lists }}\" as=\"list\" hint-placeholder-count=\"2\">\n        <div data-screen-label=\"Lijst {{ list.title }}\">\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:0 10px\">\n            <sc-if value=\"{{ list.titleEditing }}\" hint-placeholder-val=\"{{ false }}\">\n              <input autofocus=\"{{ true }}\" defaultvalue=\"{{ list.title }}\" onkeydown=\"{{ list.onTitleKey }}\" onblur=\"{{ list.onTitleBlur }}\" ref=\"{{ list.titleRef }}\" style=\"flex:1;min-width:0;width:100%;background:transparent;border:none;outline:none;border-bottom:1px solid #4a4d55;color:#f3f4f7;font-size:21px;font-weight:700;font-family:inherit;padding:2px 0\">\n            <\u002Fsc-if>\n            <sc-if value=\"{{ list.titleStatic }}\" hint-placeholder-val=\"{{ true }}\">\n              <div ondoubleclick=\"{{ list.onTitleDbl }}\" title=\"Dubbelklik om de lijstnaam te wijzigen\" style=\"flex:1;font-size:21px;font-weight:700;color:#f3f4f7;cursor:default\">{{ list.title }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"font-size:12.5px;color:#7a7d86\">{{ list.count }}<\u002Fdiv>\n            <button onclick=\"{{ list.onAddTop }}\" title=\"Taak bovenaan toevoegen\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#c9cbd2;font-size:19px;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c;color:#fff\">+<\u002Fbutton>\n            <button onclick=\"{{ list.onDeleteList }}\" title=\"Lijst en alle taken verwijderen\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;font-size:10px;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#ff453a;border-color:#ff453a\">🗑️<\u002Fbutton>\n            <button onclick=\"{{ list.onResetMain }}\" title=\"Alle gele hoofdbolletjes leegmaken\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#FFD60A;font-size:18px;font-weight:700;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c\">↺<\u002Fbutton>\n            <button onclick=\"{{ list.onResetAll }}\" title=\"Alle subtaak-bolletjes (rechts van het gele) leegmaken\" style=\"width:26px;height:26px;border-radius:8px;border:1px solid #3c3f47;background:#2a2c31;color:#ff453a;font-size:18px;font-weight:700;line-height:1;cursor:pointer;padding:0\" style-hover=\"background:#34363c\">↺<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"background:#26282d;border:1px solid #33353c;border-radius:16px;padding:10px 8px\">\n            <sc-for plice(Math.min(ed.index, arr.length), 0, node);\n    }\n    this.setState({ editing: null });\n    this.save();\n  }\n\n  findParent(taskId) {\n    const walk = (arr, cid) => {\n      for (let i = 0; i < arr.length; i++) {\n        const n = arr[i];\n        if (n.id === taskId) return { cid, index: i };\n        const r = walk(n.children || [], 'T:' + n.id); if (r) return r;\n        const r2 = walk(n.parts || [], 'P:' + n.id); if (r2) return r2;\n      }\n      return null;\n    };\n    for (const l of this.state.data.lists) { const r = walk(l.tasks, 'L:' + l.id); if (r) return r; }\n    return null;\n  }\n\n  editKey(e) {\n    if (e.key === 'ArrowRight') {\n      const inp = e.target;\n      if (inp.selectionStart !== inp.value.length) return;\n      if (!(inp.value || '').trim()) return;\n      e.preventDefault();\n      this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80);\n      const ed = this.state.editing;\n      this.commitEdit(inp.value, false);\n      if (ed && ed.cid.slice(0, 2) === 'P:') {\n        const f = this.findTask(ed.cid.slice(2));\n        this.startEdit(ed.cid, f ? (f.node.parts || []).length : 0, false);\n      } else if (this._lastCreated) {\n        const node = this._lastCreated;\n        this.startEdit('P:' + node.id, (node.parts || []).length, false);\n      }\n      return;\n    }\n    if (e.key === 'ArrowDown') {\n      const inp = e.target;\n      e.preventDefault();\n      this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80);\n      const ed = this.state.editing;\n      const hadText = !!(inp.value || '').trim();\n      this.commitEdit(inp.value, false);\n      if (!ed) return;\n      if (ed.cid.slice(0, 2) === 'P:') {\n        const p = this.findParent(ed.cid.slice(2));\n        if (p) this.startEdit(p.cid, p.index + 1, false);\n      } else if (hadText || ed.existing) {\n        this.startEdit(ed.cid, ed.index + 1, false);\n      }\n      return;\n    }\n    if (e.key === 'Enter') {\n      this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80);\n      this.commitEdit(e.target.value, false);\n    } else if (e.key === 'Escape') {\n      this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80);\n      this.setState({ editing: null });\n    }\n  }\n  editBlur(e) {\n    if (this._skipBlur) return;\n    this.commitEdit(e.target.value, false);\n  }\n\n  toggle(cid, i) {\n    const arr = this.container(cid);\n    if (arr && arr[i]) { arr[i].done = !arr[i].done; this.refresh(); }\n  }\n\n  del(cid, i) {\n    const arr = this.container(cid);\n    if (!arr || !arr[i]) return;\n    arr.splice(i, 1);\n    const popups = this.state.popups.filter(id => this.findTask(id));\n    this.setState({ popups, editing: null }); this.save();\n  }\n\n  move(cid, from, to) {\n    const arr = this.container(cid);\n    if (!arr || from === to) return;\n    const item = arr.splice(from, 1)[0];\n    let t = to; if (from < to) t = to - 1;\n    arr.splice(t, 0, item);\n    this.refresh();\n  }\n\n  openPopup(id, depth) {\n    const popups = this.state.popups.slice(0, depth + 1);\n    popups.push(id);\n    this.setState({ popups, editing: null });\n  }\n\n  dragHandlers(cid, i) {\n    return {\n      onDragStart: (e) => {\n        e.dataTransfer.effectAllowed = 'move';\n        try { e.dataTransfer.setData('text/plain', 'rondo'); } catch (err) {}\n        this._drag = { cid, idx: i };\n        setTimeout(() => this.setState({ drag: this._drag }), 0);\n      },\n      onDragOver: (e) => {\n        const d = this._drag;\n        if (!d || d.cid !== cid) return;\n        e.preventDefault();\n        const cur = this.state.dropAt;\n        if (!cur || cur.cid !== cid || cur.index !== i) this.setState({ dropAt: { cid, index: i } });\n      },\n      onDrop: (e) => {\n        e.preventDefault();\n        const d = this._drag, da = this.state.dropAt;\n        if (d && da && d.cid === cid) this.move(cid, d.idx, da.index);\n        this._drag = null;\n        this.setState({ drag: null, dropAt: null });\n      },\n      onDragEnd: () => { this._drag = null; this.setState({ drag: null, dropAt: null }); }\n    };\n  }\n\n  buildRows(cid, tasks, opts) {\n    const st = this.state;\n    const strike = this.props.strikeCompleted ?? false;\n    const plusOp = (this.props.alwaysShowPlus ?? false) ? 0.75 : 0;\n    const rows = [];\n    const ed = st.editing && st.editing.cid === cid ? st.editing : null;\n    const editRow = (text) => ({\n      key: cid + '#edit', isEdit: true, isTask: false, between: false,\n      circleColor: opts.circleColor, text: text || '',\n      onKey: (e) => this.editKey(e), onBlur: (e) => this.editBlur(e),\n      inputRef: (el) => this.focusEl(el),\n      onSplit: (e) => {\n        e.preventDefault();\n        this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 120);\n        const inp = e.currentTarget.parentNode.querySelector('input');\n        this.commitSplit(inp ? inp.value : '');\n      },\n      dropLine: 'transparent'\n    });\n    tasks.forEach((t, i) => {\n      if (ed && !ed.existing && ed.index === i) rows.push(editRow(''));\n      if (ed && ed.existing && ed.index === i) {\n        const r = editRow(t.text); r.between = i > 0; r.plusOpacity = plusOp; r.onBetween = () => this.startEdit(cid, i, false);\n        rows.push(r); return;\n      }\n      const kids = t.children || [];\n      const withSub = kids.filter(c => (c.children || []).length || c.color);\n      const dotSrc = withSub.length ? withSub : (kids.length ? [t] : []);\n      const dots = dotSrc.map(c => {\n        const cc = c.children || [];\n        const done = cc.filter(x => x.done).length;\n        const f = cc.length ? done / cc.length : 0;\n        const col = c.color || '#8e8e93';\n        const pct = Math.round(f * 100);\n        return {\n          color: col,\n          pct: pct + '%',\n          track: col + '2e',\n          ticks: cc.length > 1 ? cc.slice(1).map((x, k) => ({ left: ((k + 1) * 100 / cc.le     circleBg: t.done ? opts.circleColor : 'transparent',\n        dots, hasDots: !isSegs && dots.length > 0,\n        textColor: '#e9eaee',\n        deco,\n        onAddSub: () => this.startEdit('P:' + t.id, parts.length, false),\n        textOpacity: t.done ? 0.45 : 1,\n        onToggle: () => this.toggle(cid, i),\n        onTextClick: () => { clearTimeout(this._ct); this._ct = setTimeout(() => this.openPopup(t.id, opts.depth), 240); },\n        onTextDbl: () => { clearTimeout(this._ct); this.startEdit(cid, i, true); },\n        onDelete: () => this.del(cid, i),\n        dropLine: (st.drag && st.dropAt && st.dropAt.cid === cid && st.dropAt.index === i) ? '#9a9ca6' : 'transparent'\n      }, this.dragHandlers(cid, i)));\n    });\n    if (ed && !ed.existing && ed.index >= tasks.length) rows.push(editRow(''));\n    return rows;\n  }\n\n  tailHandlers(cid) {\n    return {\n      onTailOver: (e) => {\n        const d = this._drag;\n        if (!d || d.cid !== cid) return;\n        e.preventDefault();\n        const arr = this.container(cid) || [];\n        const cur = this.state.dropAt;\n        if (!cur || cur.cid !== cid || cur.index !== arr.length) this.setState({ dropAt: { cid, index: arr.length } });\n      },\n      onTailDrop: (e) => {\n        e.preventDefault();\n        const d = this._drag, da = this.state.dropAt;\n        if (d && da && d.cid === cid) this.move(cid, d.idx, da.index);\n        this._drag = null;\n        this.setState({ drag: null, dropAt: null });\n      },\n      tailLine: (this.state.drag && this.state.dropAt && this.state.dropAt.cid === cid && this.state.dropAt.index === (this.container(cid) || []).length) ? '#9a9ca6' : 'transparent'\n    };\n  }\n\n  commitTaskTitle(tid, value) {\n    const f = this.findTask(tid);\n    const text = (value || '').trim();\n    if (f && text) f.node.text = text;\n    this.setState({ editingTitle: null }); this.save();\n  }\n\n  commitTitle(listId, value) {\n    const l = this.state.data.lists.find(x => x.id === listId);\n    const text = (value || '').trim();\n    if (l && text) l.title = text;\n    this.setState({ editingTitle: null }); this.save();\n  }\n\n  renderVals() {\n    const st = this.state;\n    const accent = this.props.accentColor ?? '#FFD60A';\n    const lists = st.data.lists.map(l => {\n      const cid = 'L:' + l.id;\n      const done = l.tasks.filter(t => t.done).length;\n      return Object.assign({\n        key: l.id,\n        title: l.title,\n        count: done + '/' + l.tasks.length,\n        titleEditing: st.editingTitle === l.id,\n        titleStatic: st.editingTitle !== l.id,\n        onTitleDbl: () => this.setState({ editingTitle: l.id }),\n        titleRef: (el) => this.focusEl(el),\n        onTitleKey: (e) => {\n          if (e.key === 'Enter') { this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80); this.commitTitle(l.id, e.target.value); }\n          else if (e.key === 'Escape') { this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80); this.setState({ editingTitle: null }); }\n        },\n        onTitleBlur: (e) => { if (this._skipBlur) return; this.commitTitle(l.id, e.target.value); },\n        onAddTop: () => this.startEdit(cid, 0, false),\n        onAddBottom: () => this.startEdit(cid, l.tasks.length, false),\n        onDeleteList: () => {\n          if (window.confirm('Lijst \"' + l.title + '\" en alle taken verwijderen?')) {\n            st.data.lists = st.data.lists.filter(x => x.id !== l.id);\n            this.setState({ popups: st.popups.filter(id => this.findTask(id)), editing: null }); this.save();\n          }\n        },\n        onResetMain: () => {\n          l.tasks.forEach(t => { t.done = false; });\n          this.refresh();\n        },\n        onResetAll: () => {\n          if (!window.confirm('Alle subtaak-bolletjes in \"' + l.title + '\" leegmaken?')) return;\n          const clear = (arr) => (arr || []).forEach(n => { n.done = false; clear(n.children); clear(n.parts); });\n          l.tasks.forEach(t => { clear(t.children); clear(t.parts); });\n          this.refresh();\n        },\n        rows: this.buildRows(cid, l.tasks, { circleColor: accent, depth: -1 })\n      }, this.tailHandlers(cid));\n    });\n\n    const popups = st.popups.map((tid, i) => {\n      const f = this.findTask(tid);\n      if (!f) return null;\n      const n = f.node;\n      const kids = n.children || [];\n      const done = kids.filter(x => x.done).length;\n      const cid = 'T:' + tid;\n      return Object.assign({\n        key: tid + '-' + i,\n        title: n.text,\n        color: n.color || '#8e8e93',\n        count: done + '/' + kids.length,\n        dx: i * 26, dy: i * 18,\n        titleEditing: st.editingTitle === tid,\n        titleStatic: st.editingTitle !== tid,\n        onTitleClick: () => {\n          clearTimeout(this._pt);\n          this._pt = setTimeout(() => this.setState({ popups: this.state.popups.slice(0, i), editing: null }), 240);\n        },\n        onTitleDbl: () => { clearTimeout(this._pt); this.setState({ editingTitle: tid }); },\n        titleRef: (el) => this.focusEl(el),\n        onEditTitle: () => { clearTimeout(this._pt); this.setState({ editingTitle: tid }); },\n        onTitleKey: (e) => {\n          if (e.key === 'Enter') { this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80); this.commitTaskTitle(tid, e.target.value); }\n          else if (e.key === 'Escape') { this._skipBlur = true; setTimeout(() => { this._skipBlur = false; }, 80); this.setState({ editingTitle: null }); }\n        },\n        onTitleBlur: (e) => { if (this._skipBlur) return; this.commitTaskTitle(tid, e.target.value); },\n        onClose: () => this.setState({ popups: st.popups.slice(0, i), editing: null }),\n        onBackdrop: (e) => {\n          if (e.target === e.currentTarget) this.setState({ popups: this.state.popups.slice(0, i), editing: null });\n        },\n        onDeleteTask: () => {\n          if (!window.confirm('\"' + n.text + '\" en alle subtaken verwijderen?')) return;\n          const f2 = this.findTask(tid);\n          if (f2) f2.siblings.splice(f2.index, 1);\n          this.setState({ popups: this.state.popups.filter(id => this.findTask(id)), editing: null });\n          this.save();\n        },\n        onAddTop: () => this.startEdit(cid, 0, false),\n        onAddBottom: () => this.startEdit(cid, kids.length, false),\n        rows: this.buildRows(cid, kids, { circleColor: n.color || accent, depth: i })\n      }, this.tailHandlers(cid));\n    }).filter(Boolean);\n\n    return {\n      lists, popups,\n      onAddList: () => {\n        const nl = { id: this.uid(), title: 'Nieuwe lijst', tasks: [] };\n        st.data.lists.push(nl);\n        this.setState({ editingTitle: nl.id }); this.save();\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
